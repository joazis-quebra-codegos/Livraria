<!DOCTYPE html>
<html lang="pt=br">
<head>
    <meta charset="UTF-8">
    <title>Livraria Spring</title>
</head>
<body>
    <h1>Cadastro de Livros</h1>
    <p>Cadastre os novos livros abaixo:</p>
    <input type="text" id="titulo" placeholder="Insira  o título aqui">
    <input type="text" id="autor" placeholder="Insira  o autor aqui">
    <input type="number" id="preco" placeholder="Insira  o preço aqui">
    <input type="number" id="estoque" placeholder="Insira  o estoque aqui">
    <input type="text" id="isbn" placeholder="Insira  o isbn aqui">

    <button onclick="salvar()">Registrar Livro</button>

    <h2>Lista de livros</h2>
    <ul id="lista"></ul>

    <script src="script.js"></script>
</body>
</html>
